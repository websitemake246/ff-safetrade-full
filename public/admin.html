<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FF SafeTrade</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<canvas id="cyberBg" class="bg"></canvas>
<div class="overlay"></div>
<header class="navbar">
  <a href="/" class="logo">🛡️ FF Admin</a>
  <nav class="nav-links">
    <a href="#/admin">Dashboard</a>
    <a href="#/admin/users">Users</a>
    <a href="#/admin/deals">Deals</a>
    <a href="#/admin/disputes">Disputes</a>
  </nav>
  <div class="nav-actions">
    <a href="/" class="btn btn-ghost btn-sm">Home</a>
    <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
  </div>
</header>
<main class="container">
  <section class="stats">
    <div class="card"><div class="stat" id="sUsers">—</div><div class="label">Users</div></div>
    <div class="card"><div class="stat" id="sListings">—</div><div class="label">Listings</div></div>
    <div class="card"><div class="stat" id="sDeals">—</div><div class="label">Deals</div></div>
    <div class="card"><div class="stat" id="sDisputed">—</div><div class="label">Disputed</div></div>
    <div class="card"><div class="stat" id="sVolume">—</div><div class="label">Volume (₦)</div></div>
    <div class="card"><div class="stat" id="sRevenue">—</div><div class="label">Revenue (₦)</div></div>
  </section>

  <section class="card">
    <h2>Send Coins</h2>
    <div class="row">
      <input id="toEmail" class="form-control" placeholder="user@example.com">
      <input id="coinAmount" class="form-control" type="number" min="1" placeholder="1000">
      <button id="sendCoinsBtn" class="btn btn-primary">Send coins</button>
    </div>
    <p class="text-sec">1 coin = ₦1</p>
    <div id="coinResult"></div>
  </section>

  <section class="card">
    <h2>Registration Stats</h2>
    <div class="stats">
      <div class="card"><div class="stat" id="rTotalUsers">—</div><div class="label">Total users</div></div>
      <div class="card"><div class="stat" id="rOpenListings">—</div><div class="label">Open listings</div></div>
      <div class="card"><div class="stat" id="rPendingPayment">—</div><div class="label">Pending payment</div></div>
      <div class="card"><div class="stat" id="rActiveDeals">—</div><div class="label">Active deals</div></div>
    </div>
  </section>
</main>
<script src="/static/js/admin.js"></script>
</body>
</html>
