<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF SafeTrade</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<canvas id="cyberBg" class="bg"></canvas>
<div class="overlay"></div>
<header class="navbar">
  <a href="/" class="logo">⚡ FF SafeTrade</a>
  <nav class="nav-links">
    <a href="#/browse">Browse</a>
    <a href="#/listings/create">Sell</a>
    <a href="#/deals">Deals</a>
    <a href="#/coins">Coins</a>
  </nav>
  <div class="nav-actions">
    <a href="/login" class="btn btn-ghost btn-sm">Login</a>
    <a href="/register" class="btn btn-primary btn-sm">Register</a>
  </div>
</header>
<main class="container">
  <section class="hero card">
    <h1>Next-gen Free Fire Escrow</h1>
    <p class="text-sec">Secure coin payments. Verified middleman workflow.</p>
    <div class="alert">⚠️ Game accounts violate Garena ToS. Trade at your own risk.</div>
    <div class="row" style="gap:10px;margin-top:12px;">
      <a class="btn btn-primary btn-lg" href="#/browse">Browse listings</a>
      <a class="btn btn-ghost btn-lg" href="#/listings/create">Create listing</a>
    </div>
  </section>

  <section class="stats">
    <div class="card"><div class="stat" id="statUsers">—</div><div class="label">Users</div></div>
    <div class="card"><div class="stat" id="statDeals">—</div><div class="label">Deals</div></div>
    <div class="card"><div class="stat" id="statListings">—</div><div class="label">Open listings</div></div>
    <div class="card"><div class="stat" id="statFees">—</div><div class="label">Fees collected (₦)</div></div>
  </section>
</main>
<script src="/static/js/app.js"></script>
</body>
</html>
