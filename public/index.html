<main class="container mt-4" id="app"></main>

<template id="tmpl-login">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white"><h5 class="mb-0">FF SafeTrade Login</h5></div>
        <div class="card-body">
          <div class="alert alert-info">Admin: admin@safetrade.com / admin123</div>
          <form onsubmit="return false">
            <div class="mb-3"><label>Email</label><input id="loginEmail" class="form-control" type="email"></div>
            <div class="mb-3"><label>Password</label><input id="loginPassword" class="form-control" type="password"></div>
            <button class="btn btn-primary w-100" id="loginSubmit">Login</button>
          </form>
          <p class="mt-3 text-center">Don't have an account? <a href="#/register">Register</a></p>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-register">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white"><h5 class="mb-0">Register</h5></div>
        <div class="card-body">
          <form onsubmit="return false">
            <div class="mb-3"><label>Full Name</label><input id="regName" class="form-control" required></div>
            <div class="mb-3"><label>Email</label><input id="regEmail" class="form-control" type="email" required></div>
            <div class="mb-3"><label>Password</label><input id="regPassword" class="form-control" type="password" required minlength="6"></div>
            <button class="btn btn-success w-100" id="regSubmit">Register</button>
          </form>
          <p class="mt-3 text-center">Have an account? <a href="#/login">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-browse">
  <div class="row">
    <div class="col-12 mb-3">
      <div class="d-flex justify-content-between align-items-center">
        <h3>Browse Accounts</h3>
        <a href="#/listings/create" class="btn btn-primary">+ Create Listing</a>
      </div>
      <div class="input-group mt-2">
        <input id="searchPlatform" class="form-control" placeholder="Filter by platform...">
        <input id="searchMinPrice" class="form-control" type="number" placeholder="Min price (₦)">
        <input id="searchMaxPrice" class="form-control" type="number" placeholder="Max price (₦)">
        <button id="filterBtn" class="btn btn-outline-secondary">Filter</button>
        <button id="clearFilterBtn" class="btn btn-outline-danger">Clear</button>
      </div>
    </div>
    <div class="col-12" id="listingsGrid" class="row g-3"></div>
  </div>
</template>

<template id="tmpl-listing-card">
  <div class="col-md-4">
    <div class="card listing-card h-100">
      <div class="card-body">
        <h5 class="card-title text-primary"></h5>
        <h6 class="card-subtitle mb-2 text-muted"></h6>
        <p class="card-text text-success fw-bold" id="priceDisplay"></p>
        <p class="small text-muted"></p>
        <small>Seller: </small><br>
        <small class="text-muted"></small>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-listing-detail">
  <div class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title"></h2>
          <h4 class="text-primary" id="detailPrice"></h4>
          <p class="card-text" id="detailDescription"></p>
          <p><strong>Platform:</strong> <span id="detailPlatform"></span></p>
          <p><strong>Seller:</strong> <span id="detailSeller"></span></p>
          <p><strong>Status:</strong> <span id="detailStatus" class="badge"></span></p>
          <div class="d-flex gap-2 mt-3" id="listingActions"></div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-create-listing">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white"><h5 class="mb-0">Create Listing</h5></div>
        <div class="card-body">
          <form onsubmit="return false">
            <div class="mb-3"><label>Title*</label><input id="listTitle" class="form-control" required placeholder="e.g. Valorant Immortal"></div>
            <div class="mb-3"><label>Platform*</label>
              <select id="listPlatform" class="form-select">
                <option>Valorant</option><option>CS:GO</option><option>League of Legends</option>
                <option>Fortnite</option><option>Roblox</option><option>Other</option>
              </select>
            </div>
            <div class="mb-3"><label>Description</label><textarea id="listDescription" class="form-control" rows="3"></textarea></div>
            <div class="mb-3"><label>Price (₦) *</label><input id="listPrice" class="form-control" type="number" required min="10" step="1"></div>
            <div class="mb-3"><label>Evidence URLs (one per line)</label><textarea id="listEvidence" class="form-control" rows="2" placeholder="https://imgur.com/..."></textarea></div>
            <div class="mb-3"><label>Account Details (JSON)</label><textarea id="listDetails" class="form-control" rows="2" placeholder='{"email":"..."}'></textarea></div>
            <button class="btn btn-success w-100" id="createListingBtn">Create Listing</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-deals-list">
  <div class="row">
    <div class="col-12"><h3>My Deals</h3><div id="dealsList"></div></div>
  </div>
</template>

<template id="tmpl-deal-item">
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <div>
          <h5 class="card-title"></h5>
          <p class="mb-1"></p>
          <span class="badge"></span>
        </div>
        <div class="text-end">
          <p class="fw-bold text-primary"></p>
          <small></small>
        </div>
      </div>
      <div class="mt-2" id="dealActions"></div>
    </div>
  </div>
</template>

<template id="tmpl-payment">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white"><h5 class="mb-0">Complete Payment</h5></div>
        <div class="card-body">
          <div class="alert alert-info" id="paymentInfo"></div>
          <form onsubmit="return false">
            <div class="mb-3"><label>Card Last 4 Digits (test)</label><input id="cardLast4" class="form-control" type="text" placeholder="1234" maxlength="4" required></div>
            <div class="mb-3"><label>Expiry Month</label><input id="cardMonth" class="form-control" type="text" placeholder="MM" maxlength="2" required></div>
            <div class="mb-3"><label>Expiry Year</label><input id="cardYear" class="form-control" type="text" placeholder="YY" maxlength="2" required></div>
            <div class="mb-3"><label>Brand</label>
              <select id="cardBrand" class="form-select">
                <option>Visa</option><option>Mastercard</option><option>Verve</option>
              </select>
            </div>
            <div class="alert alert-warning">Test card: last 4 must pass Luhn check. Use any digits where first 4 = 4111.</div>
            <button class="btn btn-success w-100" id="payBtn">Pay with Paystack</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tmpl-admin-dashboard">
  <div class="row">
    <div class="col-12"><h3>Admin Dashboard</h3></div>
    <div class="col-md-3"><div class="card text-center p-3"><h1 id="statUsers"></h1><small>Users</small></div></div>
    <div class="col-md-3"><div class="card text-center p-3"><h1 id="statListings"></h1><small>Listings</small></div>
      <small class="text-muted" id="openListings"></small></div>
    <div class="col-md-3"><div class="card text-center p-3"><h1 id="statDeals"></h1><small>Deals</small></div>
      <small class="text-muted" id="pendingDeals"></small></div>
    <div class="col-md-3"><div class="card text-center p-3"><h1 id="statDisputed"></h1><small>Disputed</small></div>
      <small class="text-success" id="revenueStat"></small></div>
  </div>
  <hr>
  <div class="row">
    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-header"><strong>Pending Listings</strong></div>
        <div class="card-body" id="pendingListingsPanel"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-header"><strong>Recent Deals</strong></div>
        <div class="card-body" id="recentDealsPanel"><p class="text-muted">Loading...</p></div>
      </div>
    </div>
  </div>
</template>
